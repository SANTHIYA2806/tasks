<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="background-color:beige;">
    <div class="container mt-5">
        <div class="row">
            <div class="col-md-4">
                <div class="card p-3">
                    <h2 class="text-success">Grade Form</h2>
                    <div class="mb-3">
                        <label>Name : </label>
                        <input type="text" class="form-control" id="name" placeholder="Enter Your name">
                    </div>
                    <div class="mb-3">
                        <label>Register Number : </label>
                        <input type="number" class="form-control" id="regno" placeholder="Enter Your RegNo">
                    </div>
                    <div class="mb-3">
                        <label>Tamil </label>
                        <input type="number" class="form-control" id="tamil" placeholder="Enter tamil mark">
                    </div>
                    <div class="mb-3">
                        <label>English </label>
                        <input type="number" class="form-control" id="english" placeholder="Enter english mark">
                    </div>
                    <div class="mb-3">
                        <label>Maths </label>
                        <input type="number" class="form-control" id="maths" placeholder="Enter Maths mark">
                    </div>
                    <div class="mb-3">
                        <label>Science : </label>
                        <input type="number" class="form-control" id="science" placeholder="Enter Science mark">
                    </div>
                    <div class="mb-3">
                        <label>Social :</label>
                        <input type="number" class="form-control" id="social" placeholder="Enter social mark">
                    </div>

                    <button class="btn btn-success" onclick="adddata()">Calculate</button>
                </div>
            </div>
            <div class="col-md-8">
                <div class="card">
                    <table class="table table-bordered text-center">
                        <thead class="table-success">
                            <tr>
                                <th>Name</th>
                                <th>Register Number</th>
                                <th>Tamil</th>
                                <th>English</th>
                                <th>Maths</th>
                                <th>Science</th>
                                <th>Social</th>
                                <th>Total</th>
                                <th>Grade</th>
                                <th>Result</th>
                            </tr>
                        </thead>
                        <tbody id="values">

                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    <script>
        function adddata(){
            let name = document.getElementById("name").value;
            let registernumber = document.getElementById("regno").value;
            let tamil = Number(document.getElementById("tamil").value);
            let english = Number(document.getElementById("english").value);
            let maths = Number(document.getElementById("maths").value);
            let science = Number(document.getElementById("science").value);
            let social = Number(document.getElementById("social").value);

            let total = tamil+english+maths+science+social;
            console.log(total);
            

            let grade = "";
            let result = "";

            let avg = total/5;

            if(avg>=90){
                grade = "O";
            }
            else if(avg>=80){
                grade = "A+";
            }
            else if(avg>=70){
                grade = "A";
            }
            else if(avg>=60){
                grade = "B+";
            }
            else if(avg>=50){
                grade = "B";
            }
            else{
                grade = "C";
            }

            if(tamil<35 || english<35 || maths<35 || science<35 || social<35){
                result = "Fail";
            }
            else{
                result = "Pass";
            }

            document.getElementById("values").innerHTML+=
            `<tr>
                <td>${name}</td>
                <td>${registernumber}</td>
                <td>${tamil}</td>
                <td>${english}</td>
                <td>${maths}</td>
                <td>${science}</td>
                <td>${social}</td>
                <td>${total}</td>
                <td>${grade}</td>
                <td>${result}</td>
            </tr>`;

            document.getElementById("name").value = "";
            document.getElementById("regno").value = "";
            document.getElementById("tamil").value = "";
            document.getElementById("english").value = "";
            document.getElementById("maths").value = "";
            document.getElementById("science").value = "";
            document.getElementById("social").value = "";
        }
    </script>
</body>
</html>
